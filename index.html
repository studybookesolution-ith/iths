<!DOCTYPE html>
<html>
<head>
  <title>StudyBook</title>

  <!-- Mobile फिट -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="icon" href="favicon.ico">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #0f172a; /* dark background */
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      width: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Optional: limit width for better mobile UI look */
    @media (min-width: 600px) {
      iframe {
        max-width: 420px;
        height: 100%;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        border-radius: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <iframe 
      src="https://script.google.com/macros/s/AKfycbyfHE5OzzURYACzEMYeAc8cpxd1s0g82Rj8XOnquL1uJX6zJ06gwYUZZ3o_03EQJsyZhw/exec"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
